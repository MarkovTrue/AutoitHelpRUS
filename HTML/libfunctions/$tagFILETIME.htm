<h1>$tagFILETIME</h1>
<p class="funcdesc">Содержит количество 100-наносекундных интервалов с 1 января 1601 года.</p>
<p class="codeheader"><a class="le" href="../keywords/Dim.htm"><span class="S5">Global</span></a> <a class="le" href="../keywords/Dim.htm"><span class="S5">Const</span></a> <span class="S9">$tagFILETIME</span> <span class="S8">=</span> <span class="S7">"struct; dword Lo;dword Hi; endstruct"</span></p>

<h2>Параметры</h2>
<table>
<tr>
<td style="width:15%">Lo</td>
<td style="width:85%">Часть младшего порядка времени файла.</td>
</tr>
<tr>
<td>Hi</td>
<td>Часть старшего порядка времени файла.</td>
</tr>
</table>
